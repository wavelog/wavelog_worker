name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test (race detector)
        run: go test -race ./...
      - name: Build
        run: go build ./...
