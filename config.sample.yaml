ws_port: 9000
internal_port: 9001

# Optional: bind addresses.
# ws_bind:       empty/omitted = listen on all interfaces (0.0.0.0 + ::).
# internal_bind: defaults to 127.0.0.1 — the internal API carries the
#                worker_secret and should stay on localhost. Only widen this
#                (e.g. "0.0.0.0") if PHP runs on another host/container, and
#                protect it with the network/firewall in that case.
#                
#                Important: If you run the Wavelog Worker in Docker you need to set internal_bind to "0.0.0.0"
#                to allow Wavelog to reach the internal API. The Docker network isolation protects it. 
#
# ws_bind: "0.0.0.0"
# internal_bind: "127.0.0.1"

# Shared secret — must match worker_secret in Wavelog's worker.php config.
# Minimum 32 characters, Recommended: 64 characters. Generate with: openssl rand -hex 32
worker_secret: ""

# Optional: Redis URL for multi-instance clustering via Pub/Sub.
# When set, all worker instances share broadcast events through Redis.
# Omit or leave empty for single-instance mode (no Redis required).
# redis_url: "redis://localhost:6379/2"  # /0-15 selects the Redis DB — use a dedicated one

# Optional: idle window after which a registered topic expires and is evicted.
# Refreshed whenever PHP re-registers the topic. Prevents stale topics from
# accumulating in memory. Go duration format (e.g. "24h", "12h", "90m").
# Omit or leave empty for the default of 24h.
# topic_ttl: "24h"
